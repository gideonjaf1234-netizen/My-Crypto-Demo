<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: var(--tg-theme-bg-color, #0f172a); color: var(--tg-theme-text-color, #ffffff); font-family: sans-serif; overflow-x: hidden; }
        .card { background: var(--tg-theme-secondary-bg-color, #1e293b); border-radius: 16px; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item.active { color: #3b82f6; }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-3">
            <div id="user-pfp" class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold text-white">G</div>
            <div>
                <p class="text-[10px] opacity-60">Welcome back,</p>
                <p id="user-name" class="font-bold text-sm">Gideon Adeyi</p>
            </div>
        </div>
        <div onclick="copyAddress()" class="glass px-3 py-1 rounded-full text-[10px] border border-blue-500/30 text-blue-400 active:scale-95 transition">
            <i class="fa-solid fa-wallet mr-1"></i> Copy TON Address
        </div>
    </div>

    <div id="home" class="tab-content active">
        <div class="card p-6 mb-6 text-center shadow-xl bg-gradient-to-br from-blue-600/10 to-purple-600/10 border border-white/5">
            <p class="text-xs opacity-70 mb-1 text-blue-400 font-medium">TOTAL PORTFOLIO</p>
            <h1 class="text-4xl font-black mb-2">$12,450.80</h1>
            <div class="grid grid-cols-3 gap-4 mt-6">
                <button class="flex flex-col items-center gap-2 opacity-50"><div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center"><i class="fa-solid fa-plus"></i></div><span class="text-[10px]">Deposit</span></button>
                <button class="flex flex-col items-center gap-2 opacity-50"><div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center"><i class="fa-solid fa-arrow-up"></i></div><span class="text-[10px]">Send</span></button>
                <button class="flex flex-col items-center gap-2 opacity-50"><div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center"><i class="fa-solid fa-rotate"></i></div><span class="text-[10px]">Swap</span></button>
            </div>
        </div>
        <h3 class="font-bold mb-3 text-sm">Your Assets</h3>
        <div class="space-y-3">
            <div class="glass p-4 rounded-2xl flex justify-between items-center">
                <div class="flex items-center gap-3 text-sm">
                    <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-xs">💎</div>
                    <div><p class="font-bold">TONcoin</p><p class="text-[10px] opacity-50">1,240 TON</p></div>
                </div>
                <p class="font-bold text-sm text-green-400">$8,920.00</p>
            </div>
        </div>
    </div>

    <div id="tasks" class="tab-content">
        <h2 class="text-xl font-black mb-4">Earning Tasks</h2>
        <div class="space-y-3">
            <div class="glass p-4 rounded-2xl flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fa-brands fa-telegram text-blue-400 text-xl"></i>
                    <div><p class="text-sm font-bold">Join Channel</p><p class="text-[10px] text-yellow-500">+50,000 Points</p></div>
                </div>
                <button onclick="alert('Checking membership...')" class="bg-white text-black px-4 py-1 rounded-lg text-xs font-bold">Start</button>
            </div>
            <div class="glass p-4 rounded-2xl flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fa-brands fa-x-twitter text-xl"></i>
                    <div><p class="text-sm font-bold">Follow Founder</p><p class="text-[10px] text-yellow-500">+25,000 Points</p></div>
                </div>
                <button class="bg-white text-black px-4 py-1 rounded-lg text-xs font-bold">Start</button>
            </div>
        </div>
    </div>

    <div id="wallet" class="tab-content text-center py-10">
        <i class="fa-solid fa-shield-halved text-6xl text-blue-500 mb-4"></i>
        <h2 class="text-xl font-bold">Wallet Connect</h2>
        <p class="text-sm opacity-60 px-10">Connect your TONkeeper or MyTonWallet to manage assets.</p>
        <button class="mt-6 bg-blue-600 px-8 py-3 rounded-2xl font-bold">Connect Wallet</button>
    </div>

    <div class="fixed bottom-0 left-0 right-0 glass border-t border-white/10 px-8 py-3 flex justify-between items-center z-50">
        <button onclick="showTab('home', this)" class="nav-item active flex flex-col items-center gap-1">
            <i class="fa-solid fa-house"></i><span class="text-[10px]">Home</span>
        </button>
        <button onclick="showTab('tasks', this)" class="nav-item flex flex-col items-center gap-1 opacity-50">
            <i class="fa-solid fa-list-check"></i><span class="text-[10px]">Tasks</span>
        </button>
        <button onclick="showTab('wallet', this)" class="nav-item flex flex-col items-center gap-1 opacity-50">
            <i class="fa-solid fa-wallet"></i><span class="text-[10px]">Wallet</span>
        </button>
        <button onclick="alert('Settings module available in Pro version.')" class="nav-item flex flex-col items-center gap-1 opacity-50">
            <i class="fa-solid fa-gear"></i><span class="text-[10px]">Settings</span>
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // 1. Load User Data
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name').innerText = `${user.first_name} ${user.last_name || ''}`;
            document.getElementById('user-pfp').innerText = user.first_name[0].toUpperCase();
        }

        // 2. Navigation Logic
        function showTab(tabId, el) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            // Show selected tab
            document.getElementById(tabId).classList.add('active');
            
            // Update Nav UI
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active', 'opacity-100'));
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.add('opacity-50'));
            el.classList.add('active', 'opacity-100');
            el.classList.remove('opacity-50');

            tg.HapticFeedback.impactOccurred('light');
        }

        // 3. Copy Function
        function copyAddress() {
            const addr = "EQB-Demo-Address-Your-Client-Will-See";
            navigator.clipboard.writeText(addr);
            tg.showAlert("Success: TON Address copied to clipboard!");
            tg.HapticFeedback.notificationOccurred('success');
        }
    </script>
</body>
</html>
